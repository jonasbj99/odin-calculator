<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin Calculator | JBJ</title>
    <link rel="icon" type="image/x-icon" href="./img/jbj-logo.svg" />

    <link rel="stylesheet" href="./css/styles.css" />
    <script src="./js/calculator.js" defer></script>
  </head>
  <body class="fullscreen">
    <main class="calculator flex-col">
      <div class="panel">
        <div class="flex-row">
          <p>First Number</p>
          <p>Operator</p>
          <p>Second Number</p>
        </div>
      </div>
      <div class="flex-row">
        <div class="flex-col panel">
          <button id="plus">+</button>
          <button id="minus">-</button>
          <button id="multiply">*</button>
          <button id="divide">/</button>
        </div>
        <div class="num-grid panel">
          <button>7</button>
          <button>8</button>
          <button>9</button>
          <button>4</button>
          <button>5</button>
          <button>6</button>
          <button>1</button>
          <button>2</button>
          <button>3</button>
          <button>+/-</button>
          <button>0</button>
          <button>.</button>
        </div>
        <div class="flex-col">
          <div class="panel flex-col">
            <button>Clear</button>
            <button>Delete</button>
          </div>
          <div class="panel grow">
            <button id="equal">=</button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
