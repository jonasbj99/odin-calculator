<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin Calculator | JBJ</title>
    <link rel="icon" type="image/x-icon" href="./img/jbj-logo.svg" />

    <script
      src="https://kit.fontawesome.com/e639c0bb0f.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="./js/calculator.js" defer></script>
  </head>
  <body class="fullscreen">
    <main class="calculator flex-col">
      <div class="panel">
        <div class="display flex-row">
          <p id="firstNum" class="number"></p>
          <p id="operator" class="operator"></p>
          <p id="secondNum" class="number"></p>
        </div>
      </div>
      <div class="flex-row">
        <div class="flex-col panel">
          <button id="plusBtn" class="plus"><i class="fa-solid fa-plus"></i></button>
          <button id="minusBtn" class="minus"><i class="fa-solid fa-minus"></i></button>
          <button id="multiplyBtn" class="multiply"><i class="fa-solid fa-xmark"></i></button>
          <button id="divideBtn" class="divide"><i class="fa-solid fa-divide"></i></button>
        </div>
        <div id="numContainer" class="num-grid panel">
          <button value="7">7</button>
          <button value="8">8</button>
          <button value="9">9</button>
          <button value="4">4</button>
          <button value="5">5</button>
          <button value="6">6</button>
          <button value="1">1</button>
          <button value="2">2</button>
          <button value="3">3</button>
          <button disabled>+/-</button>
          <button value="0">0</button>
          <button disabled>.</button>
        </div>
        <div class="flex-col">
          <div class="panel flex-col">
            <button id="clearBtn"><i class="fa-solid fa-c"></i></i></button>
            <button id="deleteBtn"><i class="fa-solid fa-delete-left"></i></button>
          </div>
          <div class="panel grow">
            <button id="equalBtn" class="equal"><i class="fa-solid fa-equals"></i></button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
