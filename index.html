<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin Calculator | JBJ</title>
    <link rel="icon" type="image/x-icon" href="./img/jbj-logo.svg" />

    <script
      src="https://kit.fontawesome.com/e639c0bb0f.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="./js/calculator.js" defer></script>
  </head>
  <body class="fullscreen">
    <main class="calculator flex-col">
      <div class="panel">
        <div class="display flex-row">
          <p class="first-num">First Number</p>
          <p class="operator">Operator</p>
          <p class="second-num">Second Number</p>
        </div>
      </div>
      <div class="flex-row">
        <div class="flex-col panel">
          <button class="plus"><i class="fa-solid fa-plus"></i></button>
          <button class="minus"><i class="fa-solid fa-minus"></i></button>
          <button class="multiply"><i class="fa-solid fa-xmark"></i></button>
          <button class="divide"><i class="fa-solid fa-divide"></i></button>
        </div>
        <div class="num-grid panel">
          <button>7</button>
          <button>8</button>
          <button>9</button>
          <button>4</button>
          <button>5</button>
          <button>6</button>
          <button>1</button>
          <button>2</button>
          <button>3</button>
          <button>+/-</button>
          <button>0</button>
          <button>.</button>
        </div>
        <div class="flex-col">
          <div class="panel flex-col">
            <button>Clear</button>
            <button>Delete</button>
          </div>
          <div class="panel grow">
            <button class="equal"><i class="fa-solid fa-equals"></i></button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
